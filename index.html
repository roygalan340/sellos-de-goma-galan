<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELLOS DE GOMA "GALAN"</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Fondo con degradado azul y rojo suave */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #2563eb, #dc2626); 
            padding: 20px; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .tarjeta { 
            background: white; 
            border-radius: 25px; 
            padding: 40px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            max-width: 350px; 
            width: 90%; 
        }
        
        .logo { width: 100%; height: auto; border-radius: 15px; margin-bottom: 20px; }
        h1 { color: #333; margin: 10px 0; font-size: 24px; }
        .nombre-negocio { color: #2563eb; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        
        /* Botones con estilo azul y rojo */
        .boton { display: block; width: 100%; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 50px; font-weight: 600; color: white; transition: 0.3s; }
        .boton:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .btn-catalogo { background: #dc2626; } /* Rojo para catálogo */
        .btn-whatsapp { background: #25d366; } /* Verde WhatsApp (inalterable) */
        .btn-mapa { background: #4285f4; } /* Azul Google Maps */
        
        /* Iconos de redes sociales */
        .redes-sociales {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .icono-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2563eb;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: transform 0.3s, background 0.3s;
        }
        
        .icono-social:hover {
            transform: scale(1.1);
            background: #dc2626;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <img src="imagenes/publi_handy.jpg" alt="Logo" class="logo">
        <h1>Roy garicia</h1>
        <p class="nombre-negocio">SELLOS DE GOMA "GALAN"</p>
        <p>Realizamos trabajos de imprenta en general</p>
        
        
        
        
        
        <a href="https://photos.app.goo.gl/f6sjrJ6hnXG6bAVFA" class="boton btn-catalogo">Trabajo que realizamos</a>
        
        <a href="https://wa.me/69240891" class="boton btn-whatsapp">Contactar por WhatsApp</a>
        
        
        <div class="redes-sociales"><a href="https://www.facebook.com/imprentaroygarcia/" target="_blank" class="icono-social" title="Facebook"><i class="fab fa-facebook-f"></i></a><a href="ff" target="_blank" class="icono-social" title="TikTok"><i class="fab fa-tiktok"></i></a><a href="imprentagarcia.webnode.es" target="_blank" class="icono-social" title="Página Web"><i class="fas fa-globe"></i></a></div>
        
        
    </div>

</body>
</html>
