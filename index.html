    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Fondo con degradado azul y rojo suave */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #2563eb, #dc2626); 
            padding: 20px; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .tarjeta { 
            background: white; 
            border-radius: 25px; 
            padding: 40px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            max-width: 350px; 
            width: 90%; 
        }
        
        .logo { width: 100%; height: auto; border-radius: 15px; margin-bottom: 20px; }
        h1 { color: #333; margin: 10px 0; font-size: 24px; }
        .nombre-negocio { color: #2563eb; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        
        /* Botones con estilo azul y rojo */
        .boton { display: block; width: 100%; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 50px; font-weight: 600; color: white; transition: 0.3s; }
        .boton:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .btn-catalogo { background: #dc2626; } /* Rojo para catálogo */
        .btn-whatsapp { background: #25d366; } /* Verde WhatsApp (inalterable) */
        .btn-mapa { background: #4285f4; } /* Azul Google Maps */
        
        /* Iconos de redes sociales */
        .redes-sociales {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .icono-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2563eb;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: transform 0.3s, background 0.3s;
        }
        
        .icono-social:hover {
            transform: scale(1.1);
            background: #dc2626;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <img src="imagenes/s841modelo.png" alt="Logo" class="logo">
        <h1>Roy Garcia</h1>
        <p class="nombre-negocio">SELLOS DE GOMA "GALAN"</p>
        <p>Realizamos trabajos de imprenta en general</p>
        
        
        <div class="carrusel">
            <div class="carrusel-inner">

        <div class="carrusel-item active">
            <a href="imagenes/s841modelo.png" target="_blank">
                <img src="imagenes/s841modelo.png" alt="Carrusel 1">
            </a>
        </div>
        <div class="carrusel-item ">
            <a href="imagenes/IMG-20230710-WA0102.jpg" target="_blank">
                <img src="imagenes/IMG-20230710-WA0102.jpg" alt="Carrusel 2">
            </a>
        </div>
        <div class="carrusel-item ">
            <a href="imagenes/s841modelo.png" target="_blank">
                <img src="imagenes/s841modelo.png" alt="Carrusel 3">
            </a>
        </div>
            </div>
            <button class="carrusel-control prev" onclick="carruselAnterior()">&#10094;</button>
            <button class="carrusel-control next" onclick="carruselSiguiente()">&#10095;</button>
            <div class="carrusel-indicadores">
<span class="indicador active" data-slide="0"></span><span class="indicador " data-slide="1"></span><span class="indicador " data-slide="2"></span>
            </div>
        </div>
        <script>
            (function() {
                let slideIndex = 0;
                let slides = document.querySelectorAll('.carrusel-item');
                let indicadores = document.querySelectorAll('.indicador');
                
                function mostrarSlide(n) {
                    slideIndex = n;
                    if (slideIndex >= slides.length) slideIndex = 0;
                    if (slideIndex < 0) slideIndex = slides.length - 1;
                    
                    slides.forEach(slide => slide.classList.remove('active'));
                    indicadores.forEach(ind => ind.classList.remove('active'));
                    
                    slides[slideIndex].classList.add('active');
                    indicadores[slideIndex].classList.add('active');
                }
                
                window.carruselSiguiente = function() {
                    mostrarSlide(slideIndex + 1);
                };
                
                window.carruselAnterior = function() {
                    mostrarSlide(slideIndex - 1);
                };
                
                indicadores.forEach((ind, i) => {
                    ind.addEventListener('click', () => mostrarSlide(i));
                });
                
                setInterval(carruselSiguiente, 4000);
            })();
        </script>
        <style>
            .carrusel {
                position: relative;
                width: 100%;
                margin: 20px 0;
                overflow: hidden;
                border-radius: 15px;
            }
            
            .carrusel-inner {
                position: relative;
                width: 100%;
                height: 200px;
            }
            
            .carrusel-item {
                position: absolute;
                width: 100%;
                height: 100%;
                opacity: 0;
                transition: opacity 0.5s ease-in-out;
            }
            
            .carrusel-item.active {
                opacity: 1;
            }
            
            .carrusel-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 15px;
            }
            
            .carrusel-control {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                background: rgba(0,0,0,0.5);
                color: white;
                border: none;
                font-size: 24px;
                padding: 10px 15px;
                cursor: pointer;
                border-radius: 50%;
                z-index: 10;
            }
            
            .carrusel-control:hover {
                background: rgba(0,0,0,0.7);
            }
            
            .carrusel-control.prev {
                left: 10px;
            }
            
            .carrusel-control.next {
                right: 10px;
            }
            
            .carrusel-indicadores {
                position: absolute;
                bottom: 10px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 8px;
                z-index: 10;
            }
            
            .indicador {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: rgba(255,255,255,0.5);
                cursor: pointer;
            }
            
            .indicador.active {
                background: #2563eb;
            }
        </style>

    </div>

</body>
</html>
